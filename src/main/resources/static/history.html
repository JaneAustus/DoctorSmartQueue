<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue History | SmartQueue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <button id="sidebarToggle" class="d-lg-none">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <div class="sidebar d-none d-lg-block">
        <div class="p-4 mb-4">
            <h4 class="mb-0"><i class="fas fa-stethoscope me-2"></i>SmartQueue</h4>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html"><i class="fas fa-th-large me-2"></i> Dashboard</a>
            <a class="nav-link" href="appointments.html"><i class="fas fa-calendar-check me-2"></i> My Visits</a>
            <a class="nav-link active" href="history.html"><i class="fas fa-clock-rotate-left me-2"></i> History</a>
            <a class="nav-link" href="profile.html"><i class="fas fa-user-gear me-2"></i> Profile</a>
            <div style="position: absolute; bottom: 20px; width: 100%;" class="px-2">
                <a class="nav-link text-danger" href="index.html" onclick="localStorage.removeItem('hospitalUser')">
                    <i class="fas fa-power-off me-2"></i> Sign Out
                </a>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="mb-5 animate-up">
            <h1 class="fw-800 mb-1">Consultation History</h1>
            <p class="text-muted">Review your past visits and medical records overview.</p>
        </div>

        <div class="card animate-up" style="animation-delay: 0.1s;">
            <div class="table-responsive">
                <table class="table mb-0 align-middle">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4 py-3 text-uppercase small fw-bold text-muted ls-1">Date</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted ls-1">Medical Specialist</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted ls-1">Department</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted ls-1">Token Code</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted ls-1">Outcome</th>
                        </tr>
                    </thead>
                    <tbody id="historyList">
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const savedUser = JSON.parse(localStorage.getItem('hospitalUser'));
            if (!savedUser || savedUser.role !== 'PATIENT') { window.location.href = 'index.html'; return; }

            fetch(`/api/queue/patient/${savedUser.email}`)
                .then(res => res.json())
                .then(entries => {
                    const list = document.getElementById('historyList');
                    list.innerHTML = '';
                    if (entries.length === 0) {
                        list.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">No records found. Visit the dashboard to join a queue.</td></tr>';
                        return;
                    }
                    entries.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    entries.forEach(entry => {
                        const date = new Date(entry.createdAt).toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
                        let badge = 'bg-success';
                        if (entry.status === 'CANCELLED') badge = 'bg-secondary';
                        if (entry.status === 'WAITING') badge = 'bg-warning text-dark';
                        if (entry.status === 'IN_PROGRESS') badge = 'bg-primary';

                        list.innerHTML += `
                            <tr>
                                <td class="ps-4 py-3 fw-bold text-dark">${date}</td>
                                <td class="py-3">
                                    <div class="fw-bold">${entry.doctor.name}</div>
                                    <small class="text-muted">${entry.doctor.specialization}</small>
                                </td>
                                <td class="py-3 text-muted">${entry.doctor.department.name}</td>
                                <td class="py-3"><code>${entry.tokenCode}</code></td>
                                <td class="py-3"><span class="badge ${badge}">${entry.status}</span></td>
                            </tr>
                        `;
                    });
                })
                .catch(() => {
                    document.getElementById('historyList').innerHTML = '<tr><td colspan="5" class="text-center py-5 text-danger">Connection error. Please refresh.</td></tr>';
                });
        });
    </script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function () {
            document.querySelector('.sidebar').classList.toggle('mobile-show');
        });

        document.querySelectorAll('.sidebar .nav-link').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 992) {
                    document.querySelector('.sidebar').classList.remove('mobile-show');
                }
            });
        });
    </script>
</body>


</html>
