<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | SmartQueue Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="login-container d-flex align-items-center justify-content-center min-vh-100">
        <div class="login-card overflow-hidden shadow-lg d-flex flex-column flex-lg-row animate-up"
            style="max-width: 1000px; border-radius: 30px;">
            <!-- Info Section -->
            <div class="login-info d-none d-lg-flex flex-column justify-content-center text-white p-5"
                style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%) !important; width: 40%;">
                <h1 class="fw-800 mb-4">Command Center & Desk.</h1>
                <p class="opacity-75 lead mb-5">Authorized clinical and administrative access only. Efficiency starts
                    here.</p>
                <div class="mt-4">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-white bg-opacity-20 p-3 rounded-circle me-3"><i class="fas fa-shield-halved"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 fw-bold">Secure Access</h6><small class="opacity-75">Encrypted staff
                                portal</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Form Section -->
            <div class="p-5 bg-white flex-grow-1">
                <div class="text-center mb-5">
                    <h2 class="fw-800 mb-1">Administrative Sign In</h2>
                    <p class="text-muted">Enter credentials to access clinical tools</p>
                </div>

                <div id="loginError" class="alert alert-danger d-none mb-4 animate-shake" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i> <span id="errorMessage"></span>
                </div>

                <form id="loginForm" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-2 ls-1">Professional
                            Email</label>
                        <input type="email" class="form-control bg-light border-0 py-3 px-4" id="email"
                            placeholder="doctor@example.com" required>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2 ls-1">Password</label>
                            <a href="#" class="small text-primary text-decoration-none fw-bold">Forgot?</a>
                        </div>
                        <input type="password" class="form-control bg-light border-0 py-3 px-4" id="password" required>
                    </div>
                    <div class="mb-4">
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">Authorize
                            Access</button>
                    </div>

                    <div class="text-center mt-4 p-3 bg-light rounded-4">
                        <label class="small text-muted fw-bold text-uppercase mb-3 d-block">Quick Access (Staff)</label>
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="button" class="btn btn-outline-primary btn-sm rounded-pill px-3"
                                onclick="setCredentials('doctor@example.com', 'doctor123')">Doctor Desk</button>
                            <button type="button" class="btn btn-outline-primary btn-sm rounded-pill px-3"
                                onclick="setCredentials('admin@example.com', 'admin123')">Administrator</button>
                        </div>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Are you a patient? <a href="index.html"
                            class="text-primary fw-bold text-decoration-none">Patient Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setCredentials(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errorAlert = document.getElementById('loginError');
            const errorText = document.getElementById('errorMessage');
            errorAlert.classList.add('d-none');

            if (this.checkValidity()) {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';

                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    let data;
                    const contentType = response.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        data = await response.json();
                    } else {
                        const text = await response.text();
                        throw new Error(text || "Server error occurred");
                    }

                    if (response.ok) {
                        if (data.role === 'PATIENT') {
                            throw new Error("This portal is for Staff only. Please use the Patient Portal.");
                        }

                        localStorage.setItem('hospitalUser', JSON.stringify(data));
                        submitBtn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Access Granted';
                        submitBtn.className = "btn btn-success w-100 py-3 fw-bold shadow-sm";

                        setTimeout(() => {
                            if (data.role === 'DOCTOR') window.location.href = 'doctor-dashboard.html';
                            else if (data.role === 'ADMIN') window.location.href = 'admin-dashboard.html';
                        }, 800);
                    } else {
                        throw new Error(data.error || data.message || 'Invalid credentials');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    errorText.innerText = error.message;
                    errorAlert.classList.remove('d-none');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            }
            this.classList.add('was-validated');
        });
    </script>
</body>

</html>
