<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | SmartQueue Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="registration-container d-flex align-items-center justify-content-center min-vh-100">
        <div class="registration-card overflow-hidden shadow-lg d-flex flex-column flex-lg-row animate-up"
            style="max-width: 1000px; border-radius: 30px;">
            <!-- Info Section -->
            <div class="registration-info d-none d-lg-flex flex-column justify-content-center text-white p-5"
                style="background: var(--medical-gradient) !important; width: 40%;">
                <h1 class="fw-800 mb-4">Start your wellness journey.</h1>
                <p class="opacity-75 lead mb-5">Create an account to manage your medical visits with unprecedented ease
                    and transparency.</p>
                <div class="mt-4">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-white bg-opacity-20 p-3 rounded-circle me-3"><i class="fas fa-check"></i></div>
                        <div>
                            <h6 class="mb-0 fw-bold">Queue Predictor</h6><small class="opacity-75">AI powered wait
                                estimates</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Form Section -->
            <div class="p-5 bg-white flex-grow-1">
                <div class="text-center mb-5">
                    <h2 class="fw-800 mb-1">Create Patient Profile</h2>
                    <p class="text-muted">Fill in the details to get started</p>
                </div>

                <form id="registrationForm" class="needs-validation" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2 ls-1">First
                                Name</label>
                            <input type="text" class="form-control bg-light border-0" id="firstName" placeholder="John"
                                required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2 ls-1">Last
                                Name</label>
                            <input type="text" class="form-control bg-light border-0" id="lastName" placeholder="Doe"
                                required>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2 ls-1">Email
                                Address</label>
                            <input type="email" class="form-control bg-light border-0" id="email"
                                placeholder="john.doe@example.com" required>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2 ls-1">Phone
                                Number</label>
                            <input type="tel" class="form-control bg-light border-0" id="phone"
                                placeholder="+1 (555) 000-0000" required>
                        </div>
                        <div class="col-12 mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2 ls-1">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control bg-light border-0" id="password" required
                                    minlength="8">
                                <span class="input-group-text bg-light border-0 cursor-pointer" id="togglePassword"><i
                                        class="far fa-eye"></i></span>
                            </div>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">Create Account</button>
                        </div>
                    </div>
                </form>

                <div class="text-center mt-5">
                    <p class="text-muted mb-0">Already registered? <a href="index.html"
                            class="text-primary fw-bold text-decoration-none">Log in</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
